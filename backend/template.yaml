AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Running Route Planner backend (AWS SAM)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 20
    MemorySize: 512
    Tracing: Active
    Architectures:
      - x86_64
    Environment:
      Variables:
        APP_NAME: running-route-planner

Parameters:
  OpenRouteServiceSecretId:
    Type: String
    NoEcho: true
    Description: Secrets Manager secret id or ARN that stores the OpenRouteService API key
  AllowedOrigin:
    Type: String
    Default: https://running-route-planner-sheng.vercel.app
    Description: Allowed browser origin for CORS

Resources:
  RouteApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: running-route-planner-api
      StageName: prod
      TracingEnabled: true
      Cors:
        AllowMethods: "'OPTIONS,GET,POST'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: !Sub "'${AllowedOrigin}'"
      MethodSettings:
        - HttpMethod: "*"
          ResourcePath: "/*"
          MetricsEnabled: true
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 10

  GenerateRouteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: running-route-planner-generate-route
      CodeUri: src/generate-route/
      Handler: app.handler
      Environment:
        Variables:
          ORS_SECRET_ID: !Ref OpenRouteServiceSecretId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: '*'
      Events:
        GenerateRoute:
          Type: Api
          Properties:
            RestApiId: !Ref RouteApi
            Path: /routes/generate
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - app.ts

  ExportGpxFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: running-route-planner-export-gpx
      CodeUri: src/export-gpx/
      Handler: app.handler
      Events:
        ExportGpx:
          Type: Api
          Properties:
            RestApiId: !Ref RouteApi
            Path: /routes/export/gpx
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - app.ts

  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: running-route-planner-health
      CodeUri: src/health/
      Handler: app.handler
      Events:
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref RouteApi
            Path: /health
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - app.ts

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL
    Value: !Sub https://${RouteApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  GenerateRouteUrl:
    Description: Generate route endpoint
    Value: !Sub https://${RouteApi}.execute-api.${AWS::Region}.amazonaws.com/prod/routes/generate
  ExportGpxUrl:
    Description: Export GPX endpoint
    Value: !Sub https://${RouteApi}.execute-api.${AWS::Region}.amazonaws.com/prod/routes/export/gpx
  HealthCheckUrl:
    Description: Health check endpoint
    Value: !Sub https://${RouteApi}.execute-api.${AWS::Region}.amazonaws.com/prod/health
