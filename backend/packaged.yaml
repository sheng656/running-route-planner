AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Running Route Planner backend (AWS SAM)
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 20
    MemorySize: 512
    Tracing: Active
    Architectures:
    - x86_64
    Environment:
      Variables:
        APP_NAME: running-route-planner
Parameters:
  OpenRouteServiceParameterName:
    Type: String
    Default: /running-route-planner/openroute-service-api-key
    Description: SSM Parameter Store name that stores the OpenRouteService API key
  AllowedOrigin:
    Type: String
    Default: https://running-route-planner-sheng.vercel.app
    Description: Allowed browser origin for CORS
Resources:
  RouteApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: running-route-planner-api
      StageName: prod
      TracingEnabled: true
      Cors:
        AllowMethods: '''OPTIONS,GET,POST'''
        AllowHeaders: '''Content-Type,Authorization'''
        AllowOrigin:
          Fn::Sub: '''${AllowedOrigin}'''
      MethodSettings:
      - HttpMethod: '*'
        ResourcePath: /*
        MetricsEnabled: true
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10
    Metadata:
      SamResourceId: RouteApi
  GenerateRouteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: running-route-planner-generate-route
      CodeUri: s3://aws-sam-cli-managed-default-samclisourcebucket-mjog2qkod72a/7bfd14e6f0abdfb4ee874736775c1d5c
      Handler: app.handler
      Environment:
        Variables:
          ORS_PARAMETER_NAME:
            Ref: OpenRouteServiceParameterName
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - ssm:GetParameter
          Resource:
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${OpenRouteServiceParameterName}
      Events:
        GenerateRoute:
          Type: Api
          Properties:
            RestApiId:
              Ref: RouteApi
            Path: /routes/generate
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Sourcemap: false
        Target: es2022
      SamResourceId: GenerateRouteFunction
  ExportGpxFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: running-route-planner-export-gpx
      CodeUri: s3://aws-sam-cli-managed-default-samclisourcebucket-mjog2qkod72a/8b15ecf65dfbf1fcd4bdbf4c8a02d46d
      Handler: app.handler
      Events:
        ExportGpx:
          Type: Api
          Properties:
            RestApiId:
              Ref: RouteApi
            Path: /routes/export/gpx
            Method: post
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Sourcemap: false
        Target: es2022
      SamResourceId: ExportGpxFunction
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: running-route-planner-health
      CodeUri: s3://aws-sam-cli-managed-default-samclisourcebucket-mjog2qkod72a/0bf2810342bd7cc69db0ed153f4a9b2a
      Handler: app.handler
      Events:
        HealthCheck:
          Type: Api
          Properties:
            RestApiId:
              Ref: RouteApi
            Path: /health
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - app.ts
        Minify: true
        Sourcemap: false
        Target: es2022
      SamResourceId: HealthCheckFunction
Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL
    Value:
      Fn::Sub: https://${RouteApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  GenerateRouteUrl:
    Description: Generate route endpoint
    Value:
      Fn::Sub: https://${RouteApi}.execute-api.${AWS::Region}.amazonaws.com/prod/routes/generate
  ExportGpxUrl:
    Description: Export GPX endpoint
    Value:
      Fn::Sub: https://${RouteApi}.execute-api.${AWS::Region}.amazonaws.com/prod/routes/export/gpx
  HealthCheckUrl:
    Description: Health check endpoint
    Value:
      Fn::Sub: https://${RouteApi}.execute-api.${AWS::Region}.amazonaws.com/prod/health
